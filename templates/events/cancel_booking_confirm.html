{% extends 'base.html' %}
{% block title %}Cancel Booking — EventHub{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 text-center">
                <i class="bi bi-x-circle display-4 text-danger mb-3"></i>
                <h4 class="fw-bold">Cancel Booking?</h4>
                <p class="text-muted">{{ booking.event.title }}</p>
                <p class="text-muted small mb-4">Ref: <strong>{{ booking.reference }}</strong></p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100 mb-2">Yes, Cancel Booking</button>
                    <a href="{% url 'accounts:dashboard' %}" class="btn btn-outline-secondary w-100">Keep Booking</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
