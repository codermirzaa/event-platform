{% extends 'base.html' %}
{% block title %}Cancel Event — EventHub{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 text-center">
                <i class="bi bi-exclamation-triangle display-4 text-warning mb-3"></i>
                <h4 class="fw-bold">Cancel Event?</h4>
                <p class="text-muted mb-1">{{ event.title }}</p>
                <p class="text-muted small mb-4">
                    This will cancel the event and notify all {{ event.booked_count }} attendee(s).
                </p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100 mb-2">Yes, Cancel Event</button>
                    <a href="{% url 'events:detail' event.pk %}" class="btn btn-outline-secondary w-100">Go Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
